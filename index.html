<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>ESPE-commerce</title>
    <script type="module" src="src/components/espe-categorys.ts"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
      }

      .container {
        max-width: 1100px;
        width: 90%;
        border: solid 3px black;
        padding: 40px 20px;
        border-radius: 20px;
        box-shadow: 10px 5px 10px 5px rgb(69, 69, 69);
        background-color: rgb(48, 48, 48);
        margin: 2rem auto;
      }

      h1 {
        text-align: center;
        font-size: 1.8rem;
        margin-bottom: 1.5rem;
        color: aliceblue;
      }

      .search-bar {
        max-width: 600px;
        margin: auto;
        margin-bottom: 2rem;
        width: 100%;
      }

      .container-courses {
        display: flex;
        justify-content: center;
      }

      section#asignaturas {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.5rem;
        width: 100%;
      }

      espe-course-card {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <espe-nav-category id="catMenu"></espe-nav-category>
    <script>
      const catMenu = document.getElementById("catMenu");
      if (catMenu) {
        catMenu.categories = [
          {
            label: "Tecnología",
            link: "/categorias/tecnologia",
            image: "https://aecconsultoras.com/wp-content/uploads/2020/01/td.jpg",
            cantidad: 18
          },
          {
            label: "Libros",
            link: "/categorias/libros",
            image: "https://resizer.glanacion.com/resizer/v2/credito-QS3KNYFVIFHPJLNBGX45PZCZSM.jpg?auth=50f38491ae3193337eeec020a127bcabf02e8cf5fade7ed15dd8923181e7d2a1&width=768&quality=70&smart=false",
            cantidad: 12
          },
          {
            label: "Arte",
            link: "/categorias/arte",
            image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl9eLq32gAga3JV7pcaWcZmpGgf5DovPw1Qg&s",
            cantidad: 7
          },
          {
            label: "Ropa",
            link: "/categorias/ropa",
            image: "https://wwflac.awsassets.panda.org/img/8886_1_736993.jpg",
            cantidad: 25
          },
        ];
      }
    </script>
  </body>
</html>
