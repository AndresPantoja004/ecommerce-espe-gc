<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Catálogo de Productoss</title>
    <script type="module" src="/src/components/espe-product-card.ts"></script>

    <style>
      :root {
        --bg-color: #f4f4f4;
        --text-color: #111;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #121212;
          --text-color: #f4f4f4;
        }
      }

      body {
        font-family: sans-serif;
        margin: 0;
        padding: 2rem;
        background-color: var(--bg-color);
        color: var(--text-color);
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }

      h1 {
        text-align: center;
        margin-bottom: 40px;
      }
    </style>
  </head>
  <body>
    <h1>Catálogo de Productos</h1>

    <div class="grid">
      <espe-product-card
        title="Audífonos Bluetooth"
        description="Sonido envolvente y cancelación de ruido"
        price="$49.99"
        status="Disponible"
        imageUrl="https://oechsle.vteximg.com.br/arquivos/ids/1664231-800-800/1664289.jpg?v=637495774789830000"
        buttonTheme="green"
      ></espe-product-card>

      <espe-product-card
        title="Laptop Lenovo"
        description="8GB RAM, SSD 256GB, Pantalla 14''"
        price="$599.00"
        status="Sin stock"
        imageUrl="https://tse3.mm.bing.net/th/id/OIP.Yqojc1KSFkzvoFzFXJwxuwHaF7?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
        buttonTheme="yellow"
      ></espe-product-card>

      <espe-product-card
        title="Smartwatch Pro"
        description="Monitor de ritmo cardíaco, GPS y más"
        price="$120.00"
        status="Disponible"
        imageUrl="https://resources.claroshop.com/medios-plazavip/publicidad/629e2b631b6ab_1-5-png.jpg"
        buttonTheme="green"
      ></espe-product-card>

      <espe-product-card
        title="Cámara HD"
        description="Perfecta para videollamadas y streaming"
        price="$89.00"
        status="Disponible"
        imageUrl="https://images.nexusapp.co/assets/51/49/f3/359599198.jpg"
      ></espe-product-card>
    </div>
  </body>
</html>
